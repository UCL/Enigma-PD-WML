version: 2
updates:

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # group all actions updates into a single PR
      all-actions:
        patterns:
          - "*"

  # Enable version updates for pre-commit hooks
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # group all pre-commit updates into a single PR
      all-hooks:
        patterns:
          - "*"
